version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: oscar-postgres
    environment:
      POSTGRES_USER: oscar
      POSTGRES_PASSWORD: oscar
      POSTGRES_DB: oscar
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=512MB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c max_wal_size=2GB
      -c min_wal_size=1GB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oscar"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: oscar-pgbouncer
    environment:
      DATABASE_URL: "postgres://oscar:oscar@postgres:5432/oscar"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
      MIN_POOL_SIZE: 5
      RESERVE_POOL_SIZE: 5
      RESERVE_POOL_TIMEOUT: 3
    ports:
      - "5433:5432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgbouncer -V"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: oscar-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  redis-sentinel:
    image: redis:7-alpine
    container_name: oscar-redis-sentinel
    command: >
      redis-sentinel
      --sentinel monitor mymaster redis 6379 2
      --sentinel down-after-milliseconds mymaster 30000
      --sentinel failover-timeout mymaster 180000
      --sentinel parallel-syncs mymaster 1
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "26379:26379"

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: oscar:latest
    container_name: oscar-api-1
    environment:
      APP_ENV: production
      APP_PORT: 8080
      APP_SECRET: ${APP_SECRET}
      APP_BASE_URL: ${APP_BASE_URL}
      DATABASE_URL: postgres://oscar:oscar@pgbouncer:5432/oscar?sslmode=disable
      REDIS_URL: redis://redis:6379
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY: ${R2_ACCESS_KEY}
      R2_SECRET_KEY: ${R2_SECRET_KEY}
      R2_BUCKET: ${R2_BUCKET:-oscar}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1'
          memory: 1G
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: oscar-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./Caddyfile.prod:/etc/caddy/Caddyfile.prod
      - caddy_data:/data
    depends_on:
      - app
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  caddy_data:
