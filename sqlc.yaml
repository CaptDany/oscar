version: "2"
sql:
  engine: "postgresql"
  queries: "./internal/db/queries"
  gen:
    go:
      package: "db"
      out: "./internal/db/generated"
      sql_package: "pgx/v5"
      emit_json_tags: true
      emit_empty_slices: true
      emit_exact_table_names: false
      emit_interface: true
      filename_case: "snake"
